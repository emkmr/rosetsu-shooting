<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wan Wan Shooter</title>
<link rel="icon" type="image/png" href="assets/home-icon.png">
<link rel="apple-touch-icon" href="assets/home-icon.png">
<meta name="apple-mobile-web-app-title" content="Wan Wan Shooter">
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap');

body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  touch-action: none;
  width: 100vw;
  height: 100vh;
}

#bg-video {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

#game-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

#ui-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

.hud {
  padding-top: max(20px, env(safe-area-inset-top) + 20px);
  padding-left: max(20px, env(safe-area-inset-left) + 20px);
  padding-right: max(20px, env(safe-area-inset-right) + 20px);
  padding-bottom: 10px;
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  box-sizing: border-box;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 100;
}

#score-display {
  font-size: 18px;
  color: #2a2620;
  font-weight: 700;
}

#time-display {
  font-size: 18px;
  color: #2a2620;
  font-weight: 700;
}

#hearts-display {
  font-size: 22px;
  letter-spacing: 4px;
}

#start-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 217, 230, 0.55);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #333;
  z-index: 200;
  pointer-events: auto;
}

.start-btn {
  padding: 13px 32px;
  font-size: 16px;
  font-weight: bold;
  background: #da70d6;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 50px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: inherit;
  margin-top: 6px;
}

.start-btn:active {
  transform: scale(0.95);
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.overlay-card {
  width: min(340px, calc(100% - 56px));
  border-radius: 24px;
  border: 4px solid #2f4357;
  padding: 18px 18px 22px;
  background: #FFD9E6;
  box-shadow: 0 25px 40px rgba(0,0,0,0.2);
  text-align: center;
  color: #2c2c2c;
}

.overlay-caption {
  font-size: 22px;
  letter-spacing: 0.06em;
  color: rgba(33, 33, 33, 0.9);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.overlay-message {
  font-size: 28px;
  margin: 0 0 4px;
  color: #2e2e2e;
}

.overlay-subhead {
  font-size: 14px;
  margin: 0 0 6px;
  color: rgba(34,34,34,0.7);
}

.overlay-score-panel {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 16px 0 4px;
  color: #c67b1d;
}

.overlay-score-panel.visible {
  display: flex;
}

.overlay-star {
  font-size: 26px;
}

.overlay-score-text {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  line-height: 1.2;
}

.overlay-score-value {
  font-size: 28px;
  font-weight: 700;
  display: block;
  color: #2f2b27;
}

/* キャラクター選択カルーセル */
.char-select-row {
  margin: 8px 0;
}

.char-carousel-outer {
  overflow: hidden;
  width: 100%;
  position: relative;
  padding: 10px 0;
  margin: -10px 0;
}

.char-carousel-track {
  display: flex;
  align-items: center;
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
  cursor: grab;
}

.char-card {
  flex: 0 0 auto;
  width: 130px;
  margin: 0 12px;
  border: 3px solid #ccc;
  border-radius: 18px;
  padding: 14px 10px;
  cursor: pointer;
  background: rgba(255,220,235,0.8);
  transition: border-color 0.2s, transform 0.2s, opacity 0.2s, box-shadow 0.2s;
  pointer-events: auto;
  opacity: 0.45;
  transform: scale(0.88);
  text-align: center;
}

.char-card.selected {
  border-color: #ee82ee;
  border-width: 4px;
  opacity: 1;
  transform: scale(1.05);
  box-shadow: 0 8px 24px rgba(238, 130, 238, 0.4);
}

.char-canvas {
  display: block;
  margin: 0 auto 6px;
}

.char-name {
  font-size: 12px;
  font-weight: bold;
  color: #2a2620;
}

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 8px;
}

.carousel-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #ccc;
  transition: background 0.2s, transform 0.2s;
}

.carousel-dot.active {
  background: #ee82ee;
  transform: scale(1.35);
}

/* ハートエフェクト */
#heart-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}

.heart-particle {
  position: absolute;
  font-size: 28px;
  opacity: 0;
  animation: heartFall 1.1s ease-in forwards;
  user-select: none;
}

@keyframes heartFall {
  0%   { opacity: 0;   transform: translateY(0) scale(0.4) rotate(-15deg); }
  15%  { opacity: 1;   transform: translateY(-18px) scale(1.1) rotate(5deg); }
  80%  { opacity: 0.9; }
  100% { opacity: 0;   transform: translateY(110vh) scale(0.7) rotate(20deg); }
}
</style>
</head>

<body>
<div id="heart-overlay"></div>
<video id="bg-video" autoplay muted loop playsinline>
  <source src="assets/bg-video.mov" type="video/mp4">
</video>
<div id="game-container">
  <canvas id="gameCanvas"></canvas>

  <div id="ui-layer">
    <div class="hud">
      <span id="score-display">SCORE: 0</span>
      <span id="time-display">0:00</span>
      <span id="hearts-display">♡♡♡</span>
    </div>
  </div>

  <div id="start-screen">
    <div class="overlay-card">
      <img id="overlay-caption" src="assets/logo.png" style="width:100%;max-width:320px;display:block;margin:0 auto 8px;">

      <div id="overlay-message" style="display:none;">
        <img id="gameover-img" src="assets/gameover.png" style="width:100%;max-width:420px;display:block;margin:0 auto -10px;">
      </div>
      <p class="overlay-subhead" id="overlay-subhead">キャラクターを選んでね</p>

      <div class="char-select-row" id="char-select-row">
        <div class="char-carousel-outer" id="char-carousel-outer">
          <div class="char-carousel-track" id="char-carousel-track"></div>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
      </div>

      <div class="overlay-score-panel" id="overlay-score-panel">
        <span class="overlay-star">♡</span>
        <div class="overlay-score-text">
          <span>SCORE</span>
          <span class="overlay-score-value" id="overlay-score-value">0</span>
        </div>
        <span class="overlay-star">♡</span>
      </div>

      <button class="start-btn" id="start-btn">START!</button>
    </div>
  </div>
</div>

<script>
// ===== Setup =====
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreenEl = document.getElementById('start-screen');
const bgVideo = document.getElementById('bg-video');
const overlayMessageEl = document.getElementById('overlay-message');
const overlaySubheadEl = document.getElementById('overlay-subhead');
const overlayScorePanel = document.getElementById('overlay-score-panel');
const overlayScoreValue = document.getElementById('overlay-score-value');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score-display');
const timeEl = document.getElementById('time-display');
const heartsEl = document.getElementById('hearts-display');
const charSelectRow = document.getElementById('char-select-row');
const overlayCaptionEl = document.getElementById('overlay-caption');

// ===== Constants =====
const COLORS = {
  sky: '#FFD9E6',
  text: '#333333'
};
const MAX_HEARTS = 3;
const INVINCIBLE_DURATION_FRAMES = 60 * 4;
const BASEBALL_STORM_FRAMES = 90;
const AUTO_SHOOT_INTERVAL = 15;
const BULLET_SPEED = 10;
const ENEMY_SPAWN_INTERVAL_MIN = 60;
const ENEMY_SPAWN_INTERVAL_MAX = 120;
const HIT_INVINCIBLE_FRAMES = 90; // 被弾後の一時無敵

// ===== View =====
const view = { w: 0, h: 0, dpr: 1 };
let TILE_SIZE = 40;

// ===== Game state =====
let gameState = {
  isRunning: false,
  score: 0,
  hearts: MAX_HEARTS,
  selectedChar: 'rosetsu'
};

let player = {
  x: 0, y: 0, w: 56, h: 50,
  targetX: 0,
  invincible: false,
  invincibleTimer: 0,
  hitTimer: 0
};

let bullets = [];
let enemies = [];
let specialItems = [];
let particles = [];
let baseballStorm = null;
let parfaitStorm = null;
let trumpBullets = [];
let frameCount = 0;
let animationId = null;
let nextEnemySpawn = 60;
let nextItemSpawn = 300;
let scrollOffset = 0;

// Death animation
let dying = false;
let deathTimer = 0;
const DEATH_DURATION = 90; // frames before game over screen
let deathPlayerX = 0, deathPlayerY = 0;
let deathAngle = 0;
let deathVy = 0;
let shakeTimer = 0;
let deathFlashTimer = 0;

// ===== Resize =====
function getViewportSize() {
  const vv = window.visualViewport;
  return {
    w: Math.floor(vv?.width ?? window.innerWidth),
    h: Math.floor(vv?.height ?? window.innerHeight)
  };
}

function resize() {
  const { w, h } = getViewportSize();
  view.w = w;
  view.h = h;
  view.dpr = window.devicePixelRatio || 1;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.floor(w * view.dpr);
  canvas.height = Math.floor(h * view.dpr);
  ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
  TILE_SIZE = Math.max(24, Math.floor(view.h / 15));
}
window.addEventListener('resize', resize);
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// ===== Character select =====
let selectedChar = 'rosetsu';

// ===== キャラクターカルーセル =====
const CHARS = [
  { id: 'rosetsu', name: 'ロセツ', img: 'assets/home-icon.png',    filter: '' },
  { id: 'tetsuju', name: '鉄二',   img: 'assets/tetsuju-icon.png', filter: 'saturate(0.55) brightness(1.1)' },
  { id: 'bal',     name: 'BAL',    img: 'assets/bal-icon.png',     filter: '' },
  { id: 'chamo',   name: 'ちゃも', img: 'assets/chamo-icon.png',   filter: '' },
];
let charIndex = 0;

function buildCarousel() {
  const track = document.getElementById('char-carousel-track');
  const dotsEl = document.getElementById('carousel-dots');
  track.innerHTML = '';
  dotsEl.innerHTML = '';
  CHARS.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'char-card' + (i === charIndex ? ' selected' : '');
    card.id = 'card-' + ch.id;
    card.addEventListener('click', () => selectCharByIndex(i));
    const img = document.createElement('img');
    img.className = 'char-canvas';
    img.src = ch.img;
    img.width = 90; img.height = 90;
    img.style.cssText = 'object-fit:contain;display:block;margin:0 auto 6px;' + (ch.filter ? `filter:${ch.filter};` : '');
    const name = document.createElement('div');
    name.className = 'char-name';
    name.textContent = ch.name;
    card.appendChild(img);
    card.appendChild(name);
    track.appendChild(card);
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === charIndex ? ' active' : '');
    dotsEl.appendChild(dot);
  });
  setTimeout(() => updateCarouselPosition(false), 0);
}

function updateCarouselPosition(animate) {
  const track = document.getElementById('char-carousel-track');
  const outer = document.getElementById('char-carousel-outer');
  if (!track || !track.children.length) return;
  const cardEl = track.children[charIndex];
  const cardW = cardEl.offsetWidth + 20; // 20 = margin both sides
  const outerW = outer.offsetWidth;
  const x = outerW / 2 - charIndex * cardW - cardW / 2;
  track.style.transition = animate ? 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
  track.style.transform = `translateX(${x}px)`;
}

function selectCharByIndex(i) {
  charIndex = i;
  selectedChar = CHARS[i].id;
  Array.from(document.getElementById('char-carousel-track').children).forEach((card, j) => {
    card.classList.toggle('selected', j === i);
  });
  Array.from(document.getElementById('carousel-dots').children).forEach((dot, j) => {
    dot.classList.toggle('active', j === i);
  });
  updateCarouselPosition(true);
  burstHearts();
}

function initCarouselSwipe() {
  const outer = document.getElementById('char-carousel-outer');
  let startX = 0, dragging = false;
  outer.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; }, { passive: true });
  outer.addEventListener('touchend', e => {
    if (!dragging) return; dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 35) {
      const ni = dx < 0 ? Math.min(CHARS.length - 1, charIndex + 1) : Math.max(0, charIndex - 1);
      if (ni !== charIndex) selectCharByIndex(ni);
    }
  }, { passive: true });
  outer.addEventListener('mousedown', e => { startX = e.clientX; dragging = true; });
  window.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 35) {
      const ni = dx < 0 ? Math.min(CHARS.length - 1, charIndex + 1) : Math.max(0, charIndex - 1);
      if (ni !== charIndex) selectCharByIndex(ni);
    }
  });
}

function burstHearts() {
  const overlay = document.getElementById('heart-overlay');
  overlay.innerHTML = '';
  const emojis = ['🩷', '❤️', '💕', '💖', '💗'];
  const count = 30;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('span');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = Math.random() * 60 + 'vh';
    el.style.fontSize = (20 + Math.random() * 24) + 'px';
    el.style.animationDelay = (Math.random() * 0.4) + 's';
    el.style.animationDuration = (0.9 + Math.random() * 0.5) + 's';
    overlay.appendChild(el);
  }
  setTimeout(() => { overlay.innerHTML = ''; }, 1600);
}

// Draw preview canvases
// プレビューは両方img要素のため描画処理不要

// ===== Drawing: Chihuahua (ロセツ) — ported from pyon-pyon-rosetsu drawPlayer =====
// Call with ctx translated to (centerX, bottomY) of player hitbox
function drawChihuahua(c, s, frame) {
  // Colors (Rosetsu)
  const furColor    = '#FFFFFF';
  const furDark     = '#DDDDDD';
  const earInner    = '#FFC0CB';
  const eyeColor    = '#000000';
  const noseColor   = '#ff7aa2';
  const outfitColor = '#C62828';
  const outfitDark  = '#B71C1C';
  const stripe1     = '#FFFFFF';
  const stripe2     = '#1565C0';

  // Gentle float bob
  const bob = Math.sin(frame / 15) * 2;

  // Running leg animation
  const runFrame = Math.floor(frame / 4) % 4;
  let legFL = 0, legFR = 0, legBL = 0, legBR = 0;
  if (runFrame === 1)      { legFL=-2*s; legFR= 2*s; legBL= 2*s; legBR=-2*s; }
  else if (runFrame === 3) { legFL= 2*s; legFR=-2*s; legBL=-2*s; legBR= 2*s; }

  // Tail wag
  const wag = Math.sin(frame / 6) * 1.5 * s;
  c.fillStyle = furColor;
  c.beginPath();
  const tailBaseX = -10*s;
  const tailBaseY = -12*s + bob;
  c.arc(tailBaseX + wag * 0.2, tailBaseY, 4*s, 0, Math.PI*2);
  c.arc(tailBaseX - 3*s + wag * 0.4, tailBaseY - 3*s - wag * 0.2, 5*s, 0, Math.PI*2);
  c.arc(tailBaseX + 2*s + wag, tailBaseY - 4*s + wag * 0.1, 4*s, 0, Math.PI*2);
  c.fill();

  // Back legs
  c.fillStyle = furDark;
  c.fillRect(-8*s + legBL, -6*s + bob, 3*s, 6*s);
  c.fillRect( 4*s + legFL, -6*s + bob, 3*s, 6*s);

  // Body (outfit)
  c.fillStyle = outfitColor;
  c.beginPath();
  if (c.roundRect) {
    c.roundRect(-10*s, -16*s + bob, 20*s, 12*s, 4*s);
  } else {
    c.rect(-10*s, -16*s + bob, 20*s, 12*s);
  }
  c.fill();

  // Stripes on outfit
  c.fillStyle = stripe1;
  c.fillRect(-8*s, -14*s + bob, 16*s, 3*s);
  c.fillStyle = stripe2;
  c.fillRect(-8*s,  -9*s + bob, 16*s, 3*s);

  // Outfit accent (right side)
  c.fillStyle = outfitDark;
  c.fillRect(4*s, -16*s + bob, 4*s, 8*s);

  // Front legs
  c.fillStyle = furColor;
  c.fillRect(-10*s + legBR, -6*s + bob, 3*s, 6*s);
  c.fillRect(  6*s + legFR, -6*s + bob, 3*s, 6*s);

  // Head (offset right, like original)
  const headX = 6*s;
  const headY = -20*s + bob;

  // Left ear
  c.fillStyle = furColor;
  c.beginPath();
  c.moveTo(headX - 2*s, headY);
  c.lineTo(headX - 6.5*s, headY - 13*s);
  c.lineTo(headX + 2.8*s, headY - 2.4*s);
  c.fill();

  // Right ear
  c.beginPath();
  c.moveTo(headX + 2*s, headY);
  c.lineTo(headX + 7*s, headY - 13*s);
  c.lineTo(headX + 5.2*s, headY);
  c.fill();

  // Left ear inner
  c.fillStyle = earInner;
  c.beginPath();
  c.moveTo(headX - 2*s,   headY -  1*s);
  c.lineTo(headX - 5.2*s, headY - 10.5*s);
  c.lineTo(headX + 1.8*s, headY -  2.8*s);
  c.fill();

  // Right ear inner
  c.beginPath();
  c.moveTo(headX + 2.5*s, headY -  1*s);
  c.lineTo(headX + 6*s,   headY - 10.5*s);
  c.lineTo(headX + 5*s,   headY -  1*s);
  c.fill();

  // Head circle
  c.fillStyle = furColor;
  c.beginPath();
  c.arc(headX, headY, 7*s, 0, Math.PI*2);
  c.fill();

  // Cheek
  c.beginPath();
  c.arc(headX + 5*s, headY + 1*s, 3.5*s, 0, Math.PI*2);
  c.fill();

  // Eye (black)
  c.fillStyle = eyeColor;
  c.beginPath();
  c.arc(headX + 2*s, headY - 1*s, 2*s, 0, Math.PI*2);
  c.fill();

  // Eye shine
  c.fillStyle = '#FFFFFF';
  c.beginPath();
  c.arc(headX + 2.5*s, headY - 1.5*s, 0.6*s, 0, Math.PI*2);
  c.fill();

  // Nose
  c.fillStyle = noseColor;
  c.beginPath();
  c.arc(headX + 7.5*s, headY + 0.5*s, 1*s, 0, Math.PI*2);
  c.fill();
}

// ===== Drawing: Tetsuju (鉄二) — ported from pyon-pyon-rosetsu drawRabbit =====
// Call with ctx translated to (centerX, bottomY) of player hitbox
function drawTetsuju(c, size, frame) {
  const arcMin = 0.5;
  // Shift up so bottom of body sits at y=0
  const yOff = -size * 0.55;

  c.fillStyle = '#f5deb3';
  c.strokeStyle = 'black';
  c.lineWidth = Math.max(1.5, size * 0.025);

  // Body
  c.beginPath();
  c.ellipse(0, size * 0.25 + yOff, size * 0.5, size * 0.3, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();

  // Head
  c.beginPath();
  c.ellipse(0, -size * 0.1 + yOff, size * 0.4, size * 0.28, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();

  // Left ear
  c.beginPath();
  c.ellipse(-size * 0.35, -size * 0.1 + yOff, size * 0.16, size * 0.14, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();

  // Right ear
  c.beginPath();
  c.ellipse(size * 0.35, -size * 0.1 + yOff, size * 0.16, size * 0.14, 0, 0, Math.PI * 2);
  c.fill();
  c.stroke();

  // Muzzle dark marking
  c.fillStyle = '#3d3532';
  c.beginPath();
  c.ellipse(0, 0 + yOff, size * 0.25, size * 0.1, 0, 0, Math.PI * 2);
  c.fill();

  // Eyes and nose
  c.fillStyle = 'black';
  c.beginPath();
  c.arc(-size * 0.15, -size * 0.12 + yOff, Math.max(arcMin, size * 0.05), 0, Math.PI * 2);
  c.arc( size * 0.15, -size * 0.12 + yOff, Math.max(arcMin, size * 0.05), 0, Math.PI * 2);
  c.arc(0, size * 0.02 + yOff, Math.max(arcMin, size * 0.04), 0, Math.PI * 2);
  c.fill();
}

// ===== Drawing: BAL（黒プードル風、サングラス、チェーン） =====
function drawBal(c, size, frame) {
  const s = size;
  const bob = Math.sin(frame * 0.12) * s * 0.018;

  // --- 白い後ろ足 ---
  c.fillStyle = '#E8E8E8';
  c.beginPath(); c.ellipse(-s*0.22, s*0.38 + bob, s*0.18, s*0.12, -0.2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.22, s*0.38 + bob, s*0.18, s*0.12,  0.2, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#AAAAAA'; c.lineWidth = s*0.018;
  c.beginPath(); c.ellipse(-s*0.22, s*0.38 + bob, s*0.18, s*0.12, -0.2, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.ellipse( s*0.22, s*0.38 + bob, s*0.18, s*0.12,  0.2, 0, Math.PI*2); c.stroke();

  // --- 胴体（黒ふわ） ---
  c.fillStyle = '#1A1A1A';
  c.beginPath(); c.ellipse(0, s*0.10 + bob, s*0.33, s*0.30, 0, 0, Math.PI*2); c.fill();

  // ふわふわテクスチャ（小さな円を散らす）
  c.fillStyle = '#2A2A2A';
  [[-0.20,-0.02],[0.20,-0.02],[-0.10,0.18],[0.10,0.18],[0,0.00],[-0.28,0.10],[0.28,0.10]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + s*0.10 + bob, s*0.09, 0, Math.PI*2); c.fill();
  });

  // --- 白い前足 ---
  c.fillStyle = '#DCDCDC';
  c.beginPath(); c.ellipse(-s*0.28, s*0.30 + bob, s*0.13, s*0.10, 0.15, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.28, s*0.30 + bob, s*0.13, s*0.10, -0.15, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#AAAAAA'; c.lineWidth = s*0.016;
  c.beginPath(); c.ellipse(-s*0.28, s*0.30 + bob, s*0.13, s*0.10, 0.15, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.ellipse( s*0.28, s*0.30 + bob, s*0.13, s*0.10, -0.15, 0, Math.PI*2); c.stroke();

  // --- シルバーチェーン ---
  c.strokeStyle = '#C8C8C8'; c.lineWidth = s*0.028; c.lineCap = 'round';
  c.beginPath();
  c.arc(0, s*0.08 + bob, s*0.20, -0.6, Math.PI + 0.6);
  c.stroke();
  // ペンダントトップ
  c.fillStyle = '#AAAAAA';
  c.beginPath(); c.arc(0, s*0.28 + bob, s*0.055, 0, Math.PI*2); c.fill();
  c.strokeStyle = '#888'; c.lineWidth = s*0.015; c.stroke();

  // --- 頭（大きくふわ） ---
  c.fillStyle = '#1A1A1A';
  c.beginPath(); c.arc(0, -s*0.18 + bob, s*0.30, 0, Math.PI*2); c.fill();
  // ふわふわ感
  c.fillStyle = '#222222';
  [[-0.22,-0.30],[0.22,-0.30],[-0.28,-0.14],[0.28,-0.14],[0,-0.42],[-0.14,-0.42],[0.14,-0.42]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + bob, s*0.11, 0, Math.PI*2); c.fill();
  });

  // --- 鼻 ---
  c.fillStyle = '#3A2020';
  c.beginPath(); c.ellipse(0, -s*0.10 + bob, s*0.055, s*0.038, 0, 0, Math.PI*2); c.fill();

  // --- 口・舌 ---
  c.fillStyle = '#FF80A0';
  c.beginPath(); c.ellipse(0, -s*0.02 + bob, s*0.095, s*0.075, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = '#FF5577';
  c.beginPath(); c.ellipse(0, s*0.02 + bob, s*0.07, s*0.04, 0, 0, Math.PI*2); c.fill();

  // --- まろ眉（白よりのベージュ） ---
  c.fillStyle = '#EDE0CC';
  c.beginPath(); c.ellipse(-s*0.13, -s*0.335 + bob, s*0.10, s*0.026, -0.15, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.13, -s*0.335 + bob, s*0.10, s*0.026,  0.15, 0, Math.PI*2); c.fill();

  // --- 青サングラス ---
  const gx = 0, gy = -s*0.22 + bob;
  const lw2 = s*0.025;
  // 左レンズ
  c.fillStyle = '#001830';
  c.beginPath(); c.ellipse(gx - s*0.13, gy, s*0.11, s*0.068, 0, 0, Math.PI*2); c.fill();
  // 右レンズ
  c.beginPath(); c.ellipse(gx + s*0.13, gy, s*0.11, s*0.068, 0, 0, Math.PI*2); c.fill();
  // フレーム
  c.strokeStyle = '#3BAAEE'; c.lineWidth = lw2;
  c.beginPath(); c.ellipse(gx - s*0.13, gy, s*0.11, s*0.068, 0, 0, Math.PI*2); c.stroke();
  c.beginPath(); c.ellipse(gx + s*0.13, gy, s*0.11, s*0.068, 0, 0, Math.PI*2); c.stroke();
  // ブリッジ
  c.beginPath(); c.moveTo(gx - s*0.02, gy); c.lineTo(gx + s*0.02, gy); c.stroke();
  // テンプル（横に伸びるバー）
  c.beginPath(); c.moveTo(gx - s*0.24, gy); c.lineTo(gx - s*0.30, gy - s*0.02); c.stroke();
  c.beginPath(); c.moveTo(gx + s*0.24, gy); c.lineTo(gx + s*0.30, gy - s*0.02); c.stroke();
  // レンズ光沢
  c.fillStyle = 'rgba(100,200,255,0.18)';
  c.beginPath(); c.ellipse(gx - s*0.16, gy - s*0.02, s*0.05, s*0.025, -0.4, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(gx + s*0.10, gy - s*0.02, s*0.05, s*0.025, -0.4, 0, Math.PI*2); c.fill();
}

function drawChamo(c, size, frame) {
  const s = size;
  const bob = Math.sin(frame * 0.12) * s * 0.018;

  // --- 後ろ足 ---
  c.fillStyle = '#C8A87A';
  c.beginPath(); c.ellipse(-s*0.18, s*0.40 + bob, s*0.16, s*0.10, -0.2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.18, s*0.40 + bob, s*0.16, s*0.10,  0.2, 0, Math.PI*2); c.fill();

  // --- 胴体（ふわっと丸）---
  c.fillStyle = '#D4B884';
  c.beginPath(); c.ellipse(0, s*0.10 + bob, s*0.27, s*0.24, 0, 0, Math.PI*2); c.fill();
  // 胴体ふわテクスチャ
  c.fillStyle = '#C8A870';
  [[-0.22,0.06],[0.22,0.06],[0,0.22],[-0.18,0.22],[0.18,0.22]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + bob, s*0.10, 0, Math.PI*2); c.fill();
  });

  // --- デイジーチャーム（目立つ・胸元中央）---
  const fx = 0, fy = s*0.02 + bob;
  c.fillStyle = '#FFFEFE';
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    c.beginPath();
    c.ellipse(fx + Math.cos(angle)*s*0.115, fy + Math.sin(angle)*s*0.115, s*0.078, s*0.044, angle, 0, Math.PI*2);
    c.fill();
  }
  c.strokeStyle = '#D8CEC0'; c.lineWidth = s*0.010;
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    c.beginPath();
    c.ellipse(fx + Math.cos(angle)*s*0.115, fy + Math.sin(angle)*s*0.115, s*0.078, s*0.044, angle, 0, Math.PI*2);
    c.stroke();
  }
  c.fillStyle = '#F5C518';
  c.beginPath(); c.arc(fx, fy, s*0.082, 0, Math.PI*2); c.fill();
  c.fillStyle = '#FFE050';
  c.beginPath(); c.arc(fx - s*0.025, fy - s*0.025, s*0.038, 0, Math.PI*2); c.fill();

  // --- 前足 ---
  c.fillStyle = '#C8A87A';
  c.beginPath(); c.ellipse(-s*0.26, s*0.32 + bob, s*0.12, s*0.09, 0.15, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.26, s*0.32 + bob, s*0.12, s*0.09, -0.15, 0, Math.PI*2); c.fill();

  // --- 耳（毛に溶け込む大きめ垂れ耳）---
  c.fillStyle = '#B8986A';
  c.beginPath(); c.ellipse(-s*0.30, -s*0.08 + bob, s*0.14, s*0.26, -0.25, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( s*0.30, -s*0.08 + bob, s*0.14, s*0.26,  0.25, 0, Math.PI*2); c.fill();

  // --- 頭の外周ふわ毛（大きく丸く）---
  c.fillStyle = '#C8A870';
  [[-0.28,-0.18],[0.28,-0.18],[-0.30,-0.32],[0.30,-0.32],
   [-0.18,-0.44],[0.18,-0.44],[0,-0.48],[-0.10,-0.46],[0.10,-0.46]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + bob, s*0.13, 0, Math.PI*2); c.fill();
  });

  // --- 頭ベース（明るめクリーム）---
  c.fillStyle = '#D8BC8C';
  c.beginPath(); c.arc(0, -s*0.22 + bob, s*0.26, 0, Math.PI*2); c.fill();

  // --- 前髪（顔にかかるふわ毛）---
  c.fillStyle = '#C4A06C';
  [[-0.14,-0.10],[-0.06,-0.06],[0.06,-0.06],[0.14,-0.10],[-0.20,-0.14],[0.20,-0.14]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + bob, s*0.085, 0, Math.PI*2); c.fill();
  });

  // --- 頭頂ふわ（明るめ）---
  c.fillStyle = '#DCBE90';
  [[-0.08,-0.44],[0.08,-0.44],[0,-0.50],[-0.16,-0.42],[0.16,-0.42]].forEach(([dx,dy]) => {
    c.beginPath(); c.arc(dx*s, dy*s + bob, s*0.10, 0, Math.PI*2); c.fill();
  });

  // --- 目（大きく丸い・こげ茶）---
  c.fillStyle = '#1E1008';
  c.beginPath(); c.arc(-s*0.105, -s*0.20 + bob, s*0.070, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc( s*0.105, -s*0.20 + bob, s*0.070, 0, Math.PI*2); c.fill();
  // 目のつや（こげ茶内側）
  c.fillStyle = '#3A2010';
  c.beginPath(); c.arc(-s*0.105, -s*0.20 + bob, s*0.052, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc( s*0.105, -s*0.20 + bob, s*0.052, 0, Math.PI*2); c.fill();
  // ハイライト（大きめ）
  c.fillStyle = '#FFFFFF';
  c.beginPath(); c.arc(-s*0.085, -s*0.225 + bob, s*0.024, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc( s*0.125,  -s*0.225 + bob, s*0.024, 0, Math.PI*2); c.fill();

  // --- 鼻（小さめ・丸）---
  c.fillStyle = '#2A1508';
  c.beginPath(); c.ellipse(0, -s*0.10 + bob, s*0.048, s*0.034, 0, 0, Math.PI*2); c.fill();

  // --- 口（やさしいにっこり）---
  c.strokeStyle = '#5A3520'; c.lineWidth = s*0.020; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(-s*0.055, -s*0.055 + bob);
  c.quadraticCurveTo(0, s*0.005 + bob, s*0.055, -s*0.055 + bob);
  c.stroke();
}

// ===== Drawing: Player =====
function drawPlayer(ctx) {
  const s = TILE_SIZE * 0.055;
  const centerX = player.x + player.w / 2;
  const bottomY  = player.y + player.h;

  // Invincible rainbow aura (from original)
  if (player.invincible && player.hitTimer <= 0) {
    ctx.save();
    ctx.translate(centerX, bottomY - player.h * 0.5);
    const pulse = 16 + Math.sin(frameCount / 5) * 8;
    const auraW = player.w * 2.2 + pulse;
    const auraH = player.h * 2.2 + pulse;
    const maxR = Math.max(auraW, auraH);
    const grad = ctx.createRadialGradient(0, 0, player.w * 0.2, 0, 0, maxR);
    const hueOffset = (frameCount * 5) % 360;
    [0, 45, 90, 150, 210, 270, 330].forEach((hue, idx, arr) => {
      const stop = idx / (arr.length - 1);
      const alpha = 0.55 - stop * 0.4;
      grad.addColorStop(stop, `hsla(${(hue + hueOffset) % 360}, 85%, 70%, ${Math.max(alpha, 0)})`);
    });
    grad.addColorStop(1, 'hsla(0,0%,100%,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, auraW, auraH, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Blink when hit
  if (player.hitTimer > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(centerX, bottomY);
  if (selectedChar === 'tetsuju') {
    drawTetsuju(ctx, TILE_SIZE * 1.4, frameCount);
  } else if (selectedChar === 'bal') {
    drawBal(ctx, TILE_SIZE * 1.3, frameCount);
  } else if (selectedChar === 'chamo') {
    drawChamo(ctx, TILE_SIZE * 1.4, frameCount);
  } else {
    drawChihuahua(ctx, s, frameCount);
  }
  ctx.restore();
}

// ===== Drawing: Bullet =====
function drawBullets(ctx) {
  bullets.forEach(b => {
    ctx.save();
    // glow
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 2.5);
    grad.addColorStop(0, 'rgba(255,255,150,0.9)');
    grad.addColorStop(0.4, 'rgba(255,200,50,0.5)');
    grad.addColorStop(1, 'rgba(255,200,50,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FFF176';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ===== Drawing: Enemies =====
function drawKuma(ctx, x, y, size) {
  const bodyColor  = '#4A2800';
  const bellyColor = '#8B5E3C';
  const snoutColor = '#C8A882';

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.15, size * 0.52, size * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = bellyColor;
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.2, size * 0.28, size * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Arms
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(x - size * 0.52, y + size * 0.1, size * 0.18, size * 0.24, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + size * 0.52, y + size * 0.1, size * 0.18, size * 0.24, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Claws
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = Math.max(1.2, size * 0.04);
  ctx.lineCap = 'round';
  [-1, 0, 1].forEach(i => {
    ctx.beginPath();
    ctx.moveTo(x - size * 0.52 + i * size * 0.065, y + size * 0.3);
    ctx.lineTo(x - size * 0.54 + i * size * 0.075, y + size * 0.44);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + size * 0.52 + i * size * 0.065, y + size * 0.3);
    ctx.lineTo(x + size * 0.54 + i * size * 0.075, y + size * 0.44);
    ctx.stroke();
  });

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(x, y - size * 0.2, size * 0.38, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(x - size * 0.28, y - size * 0.52, size * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size * 0.28, y - size * 0.52, size * 0.14, 0, Math.PI * 2);
  ctx.fill();

  // Ear inner
  ctx.fillStyle = '#7A4020';
  ctx.beginPath();
  ctx.arc(x - size * 0.28, y - size * 0.52, size * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size * 0.28, y - size * 0.52, size * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = snoutColor;
  ctx.beginPath();
  ctx.ellipse(x, y - size * 0.1, size * 0.2, size * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(x, y - size * 0.19, size * 0.08, size * 0.055, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - size * 0.14, y - size * 0.29, size * 0.065, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size * 0.14, y - size * 0.29, size * 0.065, 0, Math.PI * 2);
  ctx.fill();

  // Eye glint
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - size * 0.11, y - size * 0.315, size * 0.022, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size * 0.17, y - size * 0.315, size * 0.022, 0, Math.PI * 2);
  ctx.fill();

  // Fierce eyebrows (angled inward = 怒り顔)
  ctx.strokeStyle = '#111';
  ctx.lineWidth = Math.max(2, size * 0.07);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size * 0.26, y - size * 0.40);
  ctx.lineTo(x - size * 0.06, y - size * 0.36);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + size * 0.26, y - size * 0.40);
  ctx.lineTo(x + size * 0.06, y - size * 0.36);
  ctx.stroke();

  // Snarl / angry mouth
  ctx.strokeStyle = '#111';
  ctx.lineWidth = Math.max(1.5, size * 0.045);
  ctx.beginPath();
  ctx.moveTo(x - size * 0.13, y - size * 0.02);
  ctx.lineTo(x - size * 0.04, y + size * 0.04);
  ctx.lineTo(x + size * 0.04, y + size * 0.04);
  ctx.lineTo(x + size * 0.13, y - size * 0.02);
  ctx.stroke();
}

function drawIchigo(ctx, x, y, size) {
  // body
  ctx.fillStyle = '#FF6B6B';
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.5);
  ctx.quadraticCurveTo(x + size * 0.55, y + size * 0.2, x + size * 0.45, y - size * 0.1);
  ctx.quadraticCurveTo(x + size * 0.3, y - size * 0.45, x, y - size * 0.3);
  ctx.quadraticCurveTo(x - size * 0.3, y - size * 0.45, x - size * 0.45, y - size * 0.1);
  ctx.quadraticCurveTo(x - size * 0.55, y + size * 0.2, x, y + size * 0.5);
  ctx.closePath();
  ctx.fill();
  // seeds
  ctx.fillStyle = '#fff0f0';
  [[0, -0.1], [0.2, 0.1], [-0.2, 0.1], [0, 0.3]].forEach(([dx, dy]) => {
    ctx.beginPath();
    ctx.ellipse(x + dx * size, y + dy * size, size * 0.06, size * 0.1, 0, 0, Math.PI*2);
    ctx.fill();
  });
  // heta
  ctx.fillStyle = '#3a9a3a';
  ctx.beginPath();
  ctx.moveTo(x, y - size * 0.3);
  ctx.bezierCurveTo(x - size*0.1, y - size*0.55, x - size*0.3, y - size*0.5, x - size*0.25, y - size*0.35);
  ctx.bezierCurveTo(x - size*0.15, y - size*0.55, x, y - size*0.6, x, y - size*0.35);
  ctx.bezierCurveTo(x + size*0.15, y - size*0.55, x + size*0.3, y - size*0.5, x + size*0.25, y - size*0.35);
  ctx.fill();
}

function drawSoldier(ctx, x, y, size) {
  const helmetColor  = '#4A5E2A';
  const helmetDark   = '#2E3D18';
  const skinColor    = '#C8956A';
  const uniformColor = '#5A6E35';
  const uniformDark  = '#3A4A20';
  const beltColor    = '#1E1208';

  // Body (uniform)
  ctx.fillStyle = uniformColor;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - size*0.38, y - size*0.08, size*0.76, size*0.58, size*0.1);
  else ctx.rect(x - size*0.38, y - size*0.08, size*0.76, size*0.58);
  ctx.fill();

  // Chest V stripe
  ctx.fillStyle = uniformDark;
  ctx.beginPath();
  ctx.moveTo(x, y - size*0.06);
  ctx.lineTo(x - size*0.14, y + size*0.22);
  ctx.lineTo(x + size*0.14, y + size*0.22);
  ctx.closePath();
  ctx.fill();

  // Belt
  ctx.fillStyle = beltColor;
  ctx.fillRect(x - size*0.38, y + size*0.3, size*0.76, size*0.1);
  // Buckle
  ctx.fillStyle = '#B8940A';
  ctx.fillRect(x - size*0.07, y + size*0.315, size*0.14, size*0.07);

  // Arms
  ctx.fillStyle = uniformColor;
  ctx.beginPath();
  ctx.ellipse(x - size*0.52, y + size*0.1, size*0.15, size*0.24, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + size*0.52, y + size*0.1, size*0.15, size*0.24, 0.2, 0, Math.PI*2);
  ctx.fill();

  // Fists
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(x - size*0.52, y + size*0.3, size*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.52, y + size*0.3, size*0.1, 0, Math.PI*2);
  ctx.fill();

  // Neck
  ctx.fillStyle = skinColor;
  ctx.fillRect(x - size*0.1, y - size*0.17, size*0.2, size*0.12);

  // Face
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(x, y - size*0.3, size*0.27, 0, Math.PI*2);
  ctx.fill();

  // Helmet body
  ctx.fillStyle = helmetColor;
  ctx.beginPath();
  ctx.arc(x, y - size*0.34, size*0.31, Math.PI, 0);
  ctx.fill();

  // Helmet brim
  ctx.fillStyle = helmetDark;
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.35, size*0.37, size*0.08, 0, Math.PI, 0);
  ctx.fill();

  // Helmet band
  ctx.strokeStyle = helmetDark;
  ctx.lineWidth = Math.max(1.5, size * 0.04);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(x, y - size*0.3, size*0.27, 0.25, Math.PI - 0.25);
  ctx.stroke();

  // Eyes (fierce)
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - size*0.1,  y - size*0.3, size*0.052, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.1,  y - size*0.3, size*0.052, 0, Math.PI*2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - size*0.076, y - size*0.318, size*0.018, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.124, y - size*0.318, size*0.018, 0, Math.PI*2);
  ctx.fill();

  // Fierce eyebrows
  ctx.strokeStyle = '#111';
  ctx.lineWidth = Math.max(2, size * 0.065);
  ctx.beginPath();
  ctx.moveTo(x - size*0.19, y - size*0.39);
  ctx.lineTo(x - size*0.04, y - size*0.365);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + size*0.19, y - size*0.39);
  ctx.lineTo(x + size*0.04, y - size*0.365);
  ctx.stroke();

  // Stern mouth
  ctx.strokeStyle = '#7A4A30';
  ctx.lineWidth = Math.max(1.5, size * 0.042);
  ctx.beginPath();
  ctx.moveTo(x - size*0.1,  y - size*0.17);
  ctx.lineTo(x + size*0.1,  y - size*0.17);
  ctx.stroke();
}

function drawLuchador(ctx, x, y, size) {
  const maskColor  = '#CC0000';
  const maskAccent = '#FFD700';
  const maskShadow = '#880000';
  const skinColor  = '#C8956A';
  const trunksColor = '#1515BB';

  // Body (muscular)
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.12, size*0.44, size*0.36, 0, 0, Math.PI*2);
  ctx.fill();

  // Trunks
  ctx.fillStyle = trunksColor;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x - size*0.34, y + size*0.26, size*0.68, size*0.28, size*0.07);
  else ctx.rect(x - size*0.34, y + size*0.26, size*0.68, size*0.28);
  ctx.fill();

  // Trunks stripe
  ctx.fillStyle = maskAccent;
  ctx.fillRect(x - size*0.34, y + size*0.28, size*0.68, size*0.06);

  // Left arm (raised, fighting pose)
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.ellipse(x - size*0.5, y - size*0.08, size*0.14, size*0.27, 0.45, 0, Math.PI*2);
  ctx.fill();

  // Right arm (raised)
  ctx.beginPath();
  ctx.ellipse(x + size*0.5, y - size*0.08, size*0.14, size*0.27, -0.45, 0, Math.PI*2);
  ctx.fill();

  // Fists
  ctx.beginPath();
  ctx.arc(x - size*0.54, y - size*0.3, size*0.13, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.54, y - size*0.3, size*0.13, 0, Math.PI*2);
  ctx.fill();

  // Neck
  ctx.fillStyle = skinColor;
  ctx.fillRect(x - size*0.1, y - size*0.15, size*0.2, size*0.1);

  // Head (mask)
  ctx.fillStyle = maskColor;
  ctx.beginPath();
  ctx.arc(x, y - size*0.33, size*0.31, 0, Math.PI*2);
  ctx.fill();

  // Mask top spike / crown shape
  ctx.beginPath();
  ctx.moveTo(x - size*0.18, y - size*0.58);
  ctx.lineTo(x,             y - size*0.68);
  ctx.lineTo(x + size*0.18, y - size*0.58);
  ctx.fill();

  // Mask eye cutouts (darker)
  ctx.fillStyle = maskShadow;
  ctx.beginPath();
  ctx.ellipse(x - size*0.13, y - size*0.36, size*0.11, size*0.075, -0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + size*0.13, y - size*0.36, size*0.11, size*0.075, 0.15, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x - size*0.13, y - size*0.365, size*0.072, size*0.052, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + size*0.13, y - size*0.365, size*0.072, size*0.052, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - size*0.11, y - size*0.368, size*0.028, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.15, y - size*0.368, size*0.028, 0, Math.PI*2);
  ctx.fill();

  // Mask decorative gold lines
  ctx.strokeStyle = maskAccent;
  ctx.lineWidth = Math.max(1.5, size*0.045);
  ctx.lineCap = 'round';
  // Center vertical
  ctx.beginPath();
  ctx.moveTo(x, y - size*0.62);
  ctx.lineTo(x, y - size*0.2);
  ctx.stroke();
  // Left curve
  ctx.beginPath();
  ctx.moveTo(x - size*0.29, y - size*0.44);
  ctx.quadraticCurveTo(x - size*0.18, y - size*0.56, x, y - size*0.62);
  ctx.stroke();
  // Right curve
  ctx.beginPath();
  ctx.moveTo(x + size*0.29, y - size*0.44);
  ctx.quadraticCurveTo(x + size*0.18, y - size*0.56, x, y - size*0.62);
  ctx.stroke();

  // Nose (small bump on mask)
  ctx.fillStyle = maskShadow;
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.26, size*0.042, size*0.032, 0, 0, Math.PI*2);
  ctx.fill();

  // Fierce mouth
  ctx.strokeStyle = maskAccent;
  ctx.lineWidth = Math.max(1.5, size*0.04);
  ctx.beginPath();
  ctx.moveTo(x - size*0.11, y - size*0.18);
  ctx.lineTo(x - size*0.03, y - size*0.13);
  ctx.lineTo(x + size*0.03, y - size*0.13);
  ctx.lineTo(x + size*0.11, y - size*0.18);
  ctx.stroke();
}

function drawUsagi(ctx, x, y, size) {
  // body
  ctx.fillStyle = '#f5deb3';
  ctx.strokeStyle = '#b89060';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.1, size*0.35, size*0.28, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // head
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.14, size*0.28, size*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // ears
  ctx.fillStyle = '#f5deb3';
  ctx.beginPath();
  ctx.ellipse(x - size*0.18, y - size*0.42, size*0.09, size*0.18, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(x + size*0.18, y - size*0.42, size*0.09, size*0.18, 0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // eyes
  ctx.fillStyle = '#3d3532';
  ctx.beginPath();
  ctx.arc(x - size*0.1, y - size*0.17, size*0.04, 0, Math.PI*2);
  ctx.arc(x + size*0.1, y - size*0.17, size*0.04, 0, Math.PI*2);
  ctx.fill();
  // nose
  ctx.fillStyle = '#cc7070';
  ctx.beginPath();
  ctx.arc(x, y - size*0.08, size*0.03, 0, Math.PI*2);
  ctx.fill();
  // star marker
  ctx.fillStyle = '#FFD700';
  ctx.font = `${Math.floor(size*0.3)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('★', x + size*0.32, y - size*0.32);
}

function drawSumo(ctx, x, y, size, diving) {
  const skin    = '#E8B090';
  const outline = '#C09070';
  const mawashi = '#1A1A7A';
  const gold    = '#C8A030';
  const hair    = '#1A1A1A';
  const lw      = size * 0.025;

  // squish vertically when diving
  ctx.save();
  if (diving) ctx.transform(1.1, 0, 0, 0.85, x * (1 - 1.1), y * (1 - 0.85));

  // left thigh
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(x - size*0.22, y + size*0.28, size*0.16, size*0.2, Math.PI*0.12, 0, Math.PI*2);
  ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke();
  // right thigh
  ctx.beginPath();
  ctx.ellipse(x + size*0.22, y + size*0.28, size*0.16, size*0.2, -Math.PI*0.12, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // left arm
  ctx.beginPath();
  ctx.ellipse(x - size*0.44, y - size*0.02, size*0.2, size*0.12, Math.PI*0.25, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  // right arm
  ctx.beginPath();
  ctx.ellipse(x + size*0.44, y - size*0.02, size*0.2, size*0.12, -Math.PI*0.25, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  // body (big round belly)
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(x, y, size*0.42, size*0.38, 0, 0, Math.PI*2);
  ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke();

  // mawashi (lower half of body)
  ctx.fillStyle = mawashi;
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.14, size*0.40, size*0.26, 0, 0, Math.PI);
  ctx.fill();

  // mawashi front knot
  ctx.fillStyle = gold;
  ctx.beginPath();
  ctx.ellipse(x, y + size*0.10, size*0.13, size*0.08, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = mawashi;
  ctx.beginPath();
  ctx.arc(x, y + size*0.10, size*0.055, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.40, size*0.26, size*0.24, 0, 0, Math.PI*2);
  ctx.fill(); ctx.strokeStyle = outline; ctx.lineWidth = lw; ctx.stroke();

  // chonmage base
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.arc(x, y - size*0.58, size*0.10, 0, Math.PI*2);
  ctx.fill();
  // topknot
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.70, size*0.045, size*0.11, 0, 0, Math.PI*2);
  ctx.fill();

  // angry eyebrows
  ctx.strokeStyle = hair; ctx.lineWidth = size*0.045; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - size*0.20, y - size*0.49);
  ctx.lineTo(x - size*0.06, y - size*0.45);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + size*0.20, y - size*0.49);
  ctx.lineTo(x + size*0.06, y - size*0.45);
  ctx.stroke();

  // eyes
  ctx.fillStyle = hair;
  ctx.beginPath();
  ctx.arc(x - size*0.11, y - size*0.40, size*0.045, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.11, y - size*0.40, size*0.045, 0, Math.PI*2);
  ctx.fill();

  // nose
  ctx.fillStyle = outline;
  ctx.beginPath();
  ctx.ellipse(x, y - size*0.34, size*0.065, size*0.045, 0, 0, Math.PI*2);
  ctx.fill();

  // snarl mouth
  ctx.strokeStyle = hair; ctx.lineWidth = size*0.035;
  ctx.beginPath();
  ctx.moveTo(x - size*0.10, y - size*0.27);
  ctx.lineTo(x - size*0.04, y - size*0.23);
  ctx.lineTo(x + size*0.04, y - size*0.23);
  ctx.lineTo(x + size*0.10, y - size*0.27);
  ctx.stroke();

  ctx.restore();

  // speed lines when diving
  if (diving) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,80,0,0.55)';
    ctx.lineWidth = size * 0.04;
    ctx.lineCap = 'round';
    for (let i = -1; i <= 1; i++) {
      const lx = x + i * size * 0.3;
      ctx.beginPath();
      ctx.moveTo(lx, y - size * 0.55);
      ctx.lineTo(lx, y - size * 0.75);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawCar(ctx, x, y, size, vx) {
  const s = size;
  const bw = s * 0.54;
  const bh = s * 0.88;
  const tilt = Math.atan2(vx, 18) * 0.55;

  // local roundRect helper
  function rr(lx, ly, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(lx + r, ly);
    ctx.lineTo(lx + w - r, ly);
    ctx.arcTo(lx + w, ly,     lx + w, ly + r,     r);
    ctx.lineTo(lx + w, ly + h - r);
    ctx.arcTo(lx + w, ly + h, lx + w - r, ly + h, r);
    ctx.lineTo(lx + r, ly + h);
    ctx.arcTo(lx,     ly + h, lx,     ly + h - r, r);
    ctx.lineTo(lx,     ly + r);
    ctx.arcTo(lx,     ly,     lx + r, ly,         r);
    ctx.closePath();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // wheels (drawn behind body)
  ctx.fillStyle = '#1A1A1A';
  [[-bw*0.5 - s*0.09, -bh*0.26], [bw*0.5 + s*0.09, -bh*0.26],
   [-bw*0.5 - s*0.09,  bh*0.24], [bw*0.5 + s*0.09,  bh*0.24]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.ellipse(wx, wy, s*0.10, s*0.145, 0, 0, Math.PI*2);
    ctx.fill();
  });
  // rims
  ctx.fillStyle = '#AAAAAA';
  [[-bw*0.5 - s*0.09, -bh*0.26], [bw*0.5 + s*0.09, -bh*0.26],
   [-bw*0.5 - s*0.09,  bh*0.24], [bw*0.5 + s*0.09,  bh*0.24]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.arc(wx, wy, s*0.048, 0, Math.PI*2);
    ctx.fill();
  });

  // car body
  ctx.fillStyle = '#CC1111';
  rr(-bw/2, -bh/2, bw, bh, s*0.09);
  ctx.fill();

  // racing stripe (clipped to body)
  ctx.save();
  rr(-bw/2, -bh/2, bw, bh, s*0.09);
  ctx.clip();
  ctx.fillStyle = '#EE2222';
  ctx.fillRect(-s*0.055, -bh/2, s*0.11, bh);
  ctx.restore();

  // body outline
  ctx.strokeStyle = '#880000';
  ctx.lineWidth = s * 0.032;
  rr(-bw/2, -bh/2, bw, bh, s*0.09);
  ctx.stroke();

  // rear window (top / back of car)
  ctx.fillStyle = '#3A5A88';
  rr(-bw*0.34, -bh*0.46, bw*0.68, bh*0.21, s*0.04);
  ctx.fill();
  ctx.strokeStyle = '#22447A';
  ctx.lineWidth = s*0.02;
  ctx.stroke();

  // front windshield (bottom / facing player)
  ctx.fillStyle = '#99DDFF';
  rr(-bw*0.36, bh*0.09, bw*0.72, bh*0.22, s*0.04);
  ctx.fill();
  ctx.strokeStyle = '#55AADD';
  ctx.lineWidth = s*0.02;
  ctx.stroke();

  // headlights (front, facing player)
  ctx.fillStyle = '#FFFF99';
  ctx.shadowBlur = s * 0.18; ctx.shadowColor = '#FFFF44';
  ctx.beginPath(); ctx.ellipse(-bw*0.31, bh*0.40, s*0.085, s*0.056, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( bw*0.31, bh*0.40, s*0.085, s*0.056, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // taillights (rear)
  ctx.fillStyle = '#FF3300';
  ctx.shadowBlur = s * 0.12; ctx.shadowColor = '#FF0000';
  ctx.beginPath(); ctx.ellipse(-bw*0.29, -bh*0.44, s*0.074, s*0.048, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( bw*0.29, -bh*0.44, s*0.074, s*0.048, 0, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawTrump(ctx, x, y, size) {
  const s = size;
  ctx.save();
  ctx.translate(x, y);

  // ===== スーツ（体） =====
  const suitColor = '#1B3A8C';
  // 左腕
  ctx.fillStyle = suitColor;
  ctx.beginPath();
  ctx.ellipse(-s*0.38, s*0.08, s*0.13, s*0.22, -0.3, 0, Math.PI*2);
  ctx.fill();
  // 右腕（小さい手 w）
  ctx.beginPath();
  ctx.ellipse( s*0.38, s*0.08, s*0.13, s*0.22,  0.3, 0, Math.PI*2);
  ctx.fill();
  // 胴体
  ctx.fillStyle = suitColor;
  ctx.beginPath();
  ctx.ellipse(0, s*0.18, s*0.32, s*0.30, 0, 0, Math.PI*2);
  ctx.fill();

  // ワイシャツ白
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(0, s*0.10, s*0.12, s*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // 赤ネクタイ（長い）
  ctx.fillStyle = '#DD0000';
  ctx.beginPath();
  ctx.moveTo(-s*0.07, -s*0.06);
  ctx.lineTo( s*0.07, -s*0.06);
  ctx.lineTo( s*0.10,  s*0.35);
  ctx.lineTo( 0,       s*0.45);
  ctx.lineTo(-s*0.10,  s*0.35);
  ctx.closePath();
  ctx.fill();
  // ネクタイ結び目
  ctx.fillStyle = '#BB0000';
  ctx.beginPath();
  ctx.ellipse(0, -s*0.06, s*0.07, s*0.05, 0, 0, Math.PI*2);
  ctx.fill();

  // ===== 顔（オレンジ） =====
  const skin = '#F4884A';
  const skinDark = '#D4662A';
  ctx.fillStyle = skin;
  ctx.beginPath();
  ctx.ellipse(0, -s*0.28, s*0.26, s*0.24, 0, 0, Math.PI*2);
  ctx.fill();

  // 顔の輪郭
  ctx.strokeStyle = skinDark;
  ctx.lineWidth = s * 0.025;
  ctx.stroke();

  // 目の周り白（目袋感）
  ctx.fillStyle = '#FAC090';
  ctx.beginPath(); ctx.ellipse(-s*0.10, -s*0.28, s*0.09, s*0.065, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( s*0.10, -s*0.28, s*0.09, s*0.065, 0, 0, Math.PI*2); ctx.fill();

  // 目
  ctx.fillStyle = '#1A1A5A';
  ctx.beginPath(); ctx.arc(-s*0.10, -s*0.29, s*0.038, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( s*0.10, -s*0.29, s*0.038, 0, Math.PI*2); ctx.fill();
  // 目ハイライト
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*0.11, -s*0.305, s*0.012, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( s*0.09,  -s*0.305, s*0.012, 0, Math.PI*2); ctx.fill();

  // 眉毛（金髪・怒り）
  ctx.strokeStyle = '#C8A020';
  ctx.lineWidth = s * 0.048;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s*0.19, -s*0.39); ctx.lineTo(-s*0.04, -s*0.36); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo( s*0.19, -s*0.39); ctx.lineTo( s*0.04, -s*0.36); ctx.stroke();

  // 鼻（大きめ）
  ctx.fillStyle = skinDark;
  ctx.beginPath();
  ctx.ellipse(0, -s*0.21, s*0.07, s*0.055, 0, 0, Math.PI*2);
  ctx.fill();

  // 口（ムスッと）
  ctx.strokeStyle = '#8B3010';
  ctx.lineWidth = s * 0.038;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s*0.11, -s*0.12);
  ctx.quadraticCurveTo(0, -s*0.09, s*0.11, -s*0.12);
  ctx.stroke();

  // ===== 髪（コームオーバー） =====
  const hairColor = '#F0C030';
  // 後頭部のボリューム
  ctx.fillStyle = hairColor;
  ctx.beginPath();
  ctx.ellipse(0, -s*0.50, s*0.26, s*0.13, 0, 0, Math.PI*2);
  ctx.fill();
  // サイドから流れる大きなコームオーバー
  ctx.beginPath();
  ctx.moveTo(-s*0.26, -s*0.44);
  ctx.quadraticCurveTo(-s*0.10, -s*0.66, s*0.22, -s*0.52);
  ctx.quadraticCurveTo( s*0.28, -s*0.46,  s*0.24, -s*0.42);
  ctx.quadraticCurveTo( s*0.10, -s*0.56, -s*0.14, -s*0.46);
  ctx.closePath();
  ctx.fill();
  // 髪の線（流れ感）
  ctx.strokeStyle = '#D4A010';
  ctx.lineWidth = s * 0.022;
  for (let i = 0; i < 3; i++) {
    const t = i / 2;
    ctx.beginPath();
    ctx.moveTo(-s*0.20 + t*s*0.18, -s*0.46);
    ctx.quadraticCurveTo(-s*0.05 + t*s*0.18, -s*0.60, s*0.15 + t*s*0.06, -s*0.48);
    ctx.stroke();
  }

  // ===== 小さい手 =====
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(-s*0.44, s*0.24, s*0.09, s*0.07, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( s*0.44, s*0.24, s*0.09, s*0.07, -0.2, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEnemies(ctx) {
  enemies.forEach(e => {
    ctx.save();
    if (e.flashTimer > 0 && Math.floor(e.flashTimer / 3) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    if (e.type === 'onigiri') drawKuma(ctx, e.x, e.y, e.size);
    else if (e.type === 'ichigo') drawIchigo(ctx, e.x, e.y, e.size);
    else if (e.type === 'donut') drawSoldier(ctx, e.x, e.y, e.size);
    else if (e.type === 'luchador') drawLuchador(ctx, e.x, e.y, e.size);

    else if (e.type === 'sumo') drawSumo(ctx, e.x, e.y, e.size, e.sumoState === 'diving');
    else if (e.type === 'car')   drawCar(ctx, e.x, e.y, e.size, e.vx);
    else if (e.type === 'trump') drawTrump(ctx, e.x, e.y, e.size);
    ctx.restore();
  });
}

// ===== Drawing: Special items =====
function drawSpecialItems(ctx) {
  specialItems.forEach(item => {
    ctx.save();
    ctx.translate(item.x, item.y);
    const pulse = 1 + Math.sin(frameCount / 10) * 0.1;
    ctx.scale(pulse, pulse);
    if (item.type === 'invincible') {
      const r = item.r;

      // outer glow
      const glow = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 1.6);
      glow.addColorStop(0, 'rgba(255,240,80,0.55)');
      glow.addColorStop(1, 'rgba(255,200,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.6, 0, Math.PI * 2);
      ctx.fill();

      // sparkle lines (4方向)
      ctx.strokeStyle = '#FFE44D';
      ctx.lineWidth = r * 0.13;
      ctx.lineCap = 'round';
      for (let i = 0; i < 4; i++) {
        const a = (Math.PI / 4) * i + frameCount * 0.04;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * r * 1.1, Math.sin(a) * r * 1.1);
        ctx.lineTo(Math.cos(a) * r * 1.65, Math.sin(a) * r * 1.65);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(Math.cos(a + Math.PI) * r * 1.1, Math.sin(a + Math.PI) * r * 1.1);
        ctx.lineTo(Math.cos(a + Math.PI) * r * 1.65, Math.sin(a + Math.PI) * r * 1.65);
        ctx.stroke();
      }

      // star body (グラデーション)
      function drawStar(outerR, innerR) {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const angle = (Math.PI * 2 * i) / 10 - Math.PI / 2;
          const rad = i % 2 === 0 ? outerR : innerR;
          if (i === 0) ctx.moveTo(Math.cos(angle)*rad, Math.sin(angle)*rad);
          else ctx.lineTo(Math.cos(angle)*rad, Math.sin(angle)*rad);
        }
        ctx.closePath();
      }

      // 影
      ctx.save();
      ctx.translate(r * 0.08, r * 0.12);
      drawStar(r, r * 0.44);
      ctx.fillStyle = 'rgba(180,100,0,0.28)';
      ctx.fill();
      ctx.restore();

      // 本体グラデーション
      const grad = ctx.createRadialGradient(-r*0.25, -r*0.3, 0, 0, 0, r);
      grad.addColorStop(0, '#FFF176');
      grad.addColorStop(0.5, '#FFD700');
      grad.addColorStop(1, '#FF9500');
      drawStar(r, r * 0.44);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = '#FF8C00';
      ctx.lineWidth = r * 0.1;
      ctx.stroke();

      // ほっぺ (チーク)
      ctx.fillStyle = 'rgba(255,140,180,0.55)';
      ctx.beginPath(); ctx.ellipse(-r*0.28, r*0.18, r*0.18, r*0.11, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( r*0.28, r*0.18, r*0.18, r*0.11, 0, 0, Math.PI*2); ctx.fill();

      // 星目（左）
      function drawStarEye(ex, ey, er) {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = (Math.PI * 2 * i) / 10 - Math.PI / 2;
          const rad = i % 2 === 0 ? er : er * 0.4;
          if (i === 0) ctx.moveTo(ex + Math.cos(a)*rad, ey + Math.sin(a)*rad);
          else ctx.lineTo(ex + Math.cos(a)*rad, ey + Math.sin(a)*rad);
        }
        ctx.closePath();
        ctx.fillStyle = '#FF6600';
        ctx.fill();
        // 白ハイライト
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath(); ctx.arc(ex - er*0.25, ey - er*0.25, er*0.28, 0, Math.PI*2); ctx.fill();
      }
      drawStarEye(-r*0.28, -r*0.05, r*0.22);
      drawStarEye( r*0.28, -r*0.05, r*0.22);

      // 口 (にっこり)
      ctx.strokeStyle = '#CC5500';
      ctx.lineWidth = r * 0.1;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(0, r * 0.22, r * 0.22, 0.2, Math.PI - 0.2);
      ctx.stroke();
    } else if (item.type === 'baseball') {
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(0, 0, item.r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#c73b3b';
      ctx.lineWidth = Math.max(1, item.r * 0.18);
      ctx.beginPath();
      ctx.arc(-item.r*0.3, 0, item.r*0.85, -0.6, 0.6);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(item.r*0.3, 0, item.r*0.85, Math.PI-0.6, Math.PI+0.6);
      ctx.stroke();
    }
    ctx.restore();
  });
}

// ===== Drawing: Particles =====
function drawParticles(ctx) {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  });
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 3 + Math.random() * 4,
      color,
      life: 30 + Math.floor(Math.random() * 20),
      maxLife: 50
    });
  }
}

// ===== Drawing: Background =====
function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16);
  const bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const r = Math.round(ar + (br - ar) * t);
  const g = Math.round(ag + (bg - ag) * t);
  const bv = Math.round(ab + (bb - ab) * t);
  return `rgb(${r},${g},${bv})`;
}

function drawBackground(ctx) {
  const baseColor = gameState.hearts >= 3 ? '#FFD9E6'
                  : gameState.hearts === 2 ? '#E8D9FF'
                  : '#4682B4';
  let bgColor = baseColor;
  if (dying) {
    const t = Math.min(deathTimer / (DEATH_DURATION * 0.7), 1);
    bgColor = lerpColor(baseColor, '#CC0000', t);
  }
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, view.w, view.h);

  // scrolling clouds
  ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
  const cloud = (cx, cy, s) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 28*s, 0, Math.PI*2);
    ctx.arc(cx+38*s, cy+8*s, 36*s, 0, Math.PI*2);
    ctx.arc(cx-36*s, cy+8*s, 36*s, 0, Math.PI*2);
    ctx.fill();
  };
  const offset = (scrollOffset * 0.3) % (view.w + 400);
  for (let i = 0; i < 4; i++) {
    let cx = (200 + i * 350 - offset);
    while (cx > view.w + 200) cx -= (view.w + 400);
    cloud(cx, 100 + (i % 2) * 60, 0.9 + (i % 2) * 0.2);
  }
}

// ===== Drawing: Big Bang =====
function drawBigBangEffect(ctx, t) {
  const progress = 1 - t;
  const cx = view.w * 0.5;
  const cy = view.h * 0.5;
  const maxR = Math.max(view.w, view.h) * (0.5 + progress * 1.6);
  const fade = Math.min(1, t);
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.6);
  core.addColorStop(0, `rgba(255,255,255,${1.0*fade})`);
  core.addColorStop(0.35, `rgba(255,245,210,${0.9*fade})`);
  core.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = core;
  ctx.fillRect(0, 0, view.w, view.h);
  const halo = ctx.createRadialGradient(cx, cy, maxR*0.2, cx, cy, maxR);
  halo.addColorStop(0, `rgba(255,255,255,${0.6*fade})`);
  halo.addColorStop(0.7, `rgba(200,240,255,${0.35*fade})`);
  halo.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(0, 0, view.w, view.h);
  ctx.restore();
}

// ===== Baseball storm =====
function triggerBaseballStorm() {
  const count = Math.max(60, Math.min(160, Math.floor((view.w * view.h) / 7000)));
  baseballStorm = { timer: BASEBALL_STORM_FRAMES, balls: [] };
  for (let i = 0; i < count; i++) {
    const r = 10 + Math.random() * 12;
    baseballStorm.balls.push({
      x: Math.random() * view.w,
      y: Math.random() * view.h,
      r,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      spin: Math.random() * Math.PI
    });

}

function drawTrumpBullets(ctx) {
  trumpBullets.forEach(tb => {
    ctx.save();
    ctx.translate(tb.x, tb.y);
    ctx.rotate(tb.angle + Math.PI / 2);
    const r = tb.r;
    // 札束の重なり（3枚）
    for (let i = 2; i >= 0; i--) {
      ctx.save();
      ctx.translate(i * 1.5, -i * 1.5);
      ctx.fillStyle = i === 0 ? '#2E8B2E' : '#3A9A3A';
      ctx.strokeStyle = '#1A5C1A';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(-r, -r * 0.6, r * 2, r * 1.2, 3);
      ctx.fill();
      ctx.stroke();
      if (i === 0) {
        // ドルマーク
        ctx.fillStyle = '#AAFF88';
        ctx.font = `bold ${Math.round(r * 1.1)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 0);
        // 帯
        ctx.fillStyle = '#1A5C1A';
        ctx.fillRect(-r, -r * 0.08, r * 2, r * 0.18);
      }
      ctx.restore();
    }
    ctx.restore();
  });
}

function drawBaseballStorm(ctx) {
  if (!baseballStorm) return;
  baseballStorm.balls.forEach(ball => {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.spin += 0.05;
    if (ball.x < -ball.r) ball.x = view.w + ball.r;
    if (ball.x > view.w + ball.r) ball.x = -ball.r;
    if (ball.y > view.h + ball.r) ball.y = -ball.r;
    // draw
    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(ball.spin);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#c73b3b';
    ctx.lineWidth = Math.max(1, ball.r * 0.18);
    ctx.beginPath();
    ctx.arc(-ball.r*0.3, 0, ball.r*0.85, -0.6, 0.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(ball.r*0.3, 0, ball.r*0.85, Math.PI-0.6, Math.PI+0.6);
    ctx.stroke();
    ctx.restore();

    // damage enemies
    enemies.forEach(e => {
      if (e.hp <= 0 || e.type === 'ichigo') return;
      const dx = ball.x - e.x;
      const dy = ball.y - e.y;
      if (Math.sqrt(dx*dx + dy*dy) < ball.r + e.size * 0.5) {
        if (!e._bbHit) {
          e.hp--;
          e._bbHit = true;
          setTimeout(() => { e._bbHit = false; }, 200);
          if (e.hp <= 0) killEnemy(e);
        }
      }
    });
  });
  baseballStorm.timer--;
  if (baseballStorm.timer <= 0) baseballStorm = null;
}

// ===== Parfait Storm =====
function drawParfait(ctx, x, y, size) {
  // Glass
  ctx.fillStyle = 'rgba(220, 240, 255, 0.75)';
  ctx.strokeStyle = '#a8cce8';
  ctx.lineWidth = Math.max(1, size * 0.04);
  ctx.beginPath();
  ctx.moveTo(x - size*0.32, y - size*0.48);
  ctx.lineTo(x + size*0.32, y - size*0.48);
  ctx.lineTo(x + size*0.26, y + size*0.5);
  ctx.lineTo(x - size*0.26, y + size*0.5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Strawberry sauce layer
  ctx.fillStyle = '#FF9EAD';
  ctx.fillRect(x - size*0.29, y - size*0.1, size*0.58, size*0.18);

  // Cream layer
  ctx.fillStyle = '#FFF8F0';
  ctx.fillRect(x - size*0.29, y + size*0.08, size*0.58, size*0.18);

  // Whipped cream on top (swirl)
  ctx.fillStyle = '#FFFAF5';
  ctx.beginPath();
  ctx.arc(x, y - size*0.58, size*0.22, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x - size*0.12, y - size*0.66, size*0.13, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + size*0.12, y - size*0.66, size*0.13, 0, Math.PI*2);
  ctx.fill();

  // Strawberry on top
  ctx.fillStyle = '#FF6B6B';
  ctx.beginPath();
  ctx.arc(x, y - size*0.82, size*0.15, 0, Math.PI*2);
  ctx.fill();
  // Strawberry seeds
  ctx.fillStyle = '#fff0f0';
  [[0,-0.05],[0.06,0.04],[-0.06,0.04]].forEach(([dx,dy]) => {
    ctx.beginPath();
    ctx.ellipse(x + dx*size, y - size*0.82 + dy*size, size*0.025, size*0.04, 0, 0, Math.PI*2);
    ctx.fill();
  });
  // Green leaf
  ctx.fillStyle = '#4CAF50';
  ctx.beginPath();
  ctx.moveTo(x, y - size*0.82);
  ctx.bezierCurveTo(x - size*0.1, y - size*1.0, x - size*0.18, y - size*0.92, x - size*0.08, y - size*0.9);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y - size*0.82);
  ctx.bezierCurveTo(x + size*0.1, y - size*1.0, x + size*0.18, y - size*0.92, x + size*0.08, y - size*0.9);
  ctx.fill();
}

function triggerParfaitStorm(onComplete) {
  const count = Math.max(25, Math.min(70, Math.floor((view.w * view.h) / 14000)));
  parfaitStorm = { timer: 160, parfaits: [], onComplete };
  for (let i = 0; i < count; i++) {
    const size = 18 + Math.random() * 28;
    parfaitStorm.parfaits.push({
      x: Math.random() * view.w,
      y: -60 - Math.random() * view.h * 0.8,
      size,
      vy: 1.2 + Math.random() * 2.5,
      vx: (Math.random() - 0.5) * 1.5,
      spin: Math.random() * Math.PI * 2
    });
  }
}

function drawParfaitStorm(ctx) {
  if (!parfaitStorm) return;
  parfaitStorm.parfaits.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y > view.h + 80) p.y = -80;
    ctx.save();
    ctx.translate(p.x, p.y);
    drawParfait(ctx, 0, 0, p.size);
    ctx.restore();
  });
  parfaitStorm.timer--;
  if (parfaitStorm.timer <= 0) {
    if (parfaitStorm.onComplete) parfaitStorm.onComplete();
    parfaitStorm = null;
  }
}

// ===== HUD =====
function drawHUD() {
  scoreEl.innerText = `SCORE: ${gameState.score}`;
  const full = '♥';
  const empty = '♡';
  let s = '';
  for (let i = 0; i < MAX_HEARTS; i++) s += (i < gameState.hearts ? full : empty);

// ===== Spawning =====
function spawnEnemy() {
  const types = ['onigiri', 'donut', 'luchador', 'sumo', 'car', 'trump'];
  let type = Math.random() < 0.04 ? 'ichigo' : types[Math.floor(Math.random() * types.length)];

  const size = type === 'car' ? 50 + Math.random() * 16 : 38 + Math.random() * 20;
  const x = size + Math.random() * (view.w - size * 2);

  const patterns = {
    onigiri:  { vx: 0, vy: 2.5 + Math.random(), sinAmp: 0, sinFreq: 0 },
    ichigo:   { vx: 0, vy: 2 + Math.random() * 0.5, sinAmp: 60, sinFreq: 0.04 },
    donut:    { vx: 0, vy: 1.5, sinAmp: 0, sinFreq: 0, accel: 0.03 },
    luchador: { vx: 0, vy: 1.8, sinAmp: 80, sinFreq: 0.06 },

    sumo:     { vx: 0, vy: 1.2, sinAmp: 0, sinFreq: 0 },
    car:      { vx: (Math.random() - 0.5) * 8, vy: 2 + Math.random() * 3, sinAmp: 0, sinFreq: 0 },
    trump:    { vx: 0, vy: 1.0 + Math.random() * 0.5, sinAmp: 55, sinFreq: 0.03 }
  };

  const pts = { onigiri: 100, ichigo: 150, donut: 200, luchador: 175, sumo: 250, car: 220, trump: 300 };
  const p = patterns[type];
  const hp = type === 'onigiri' ? 3 : type === 'donut' ? 3 : type === 'luchador' ? 4 : type === 'sumo' ? 4 : type === 'car' ? 3 : type === 'trump' ? 5 : 1;

  const enemy = {
    type, x, y: -size,
    baseX: x,
    size,
    vx: p.vx, vy: p.vy,
    sinAmp: p.sinAmp || 0,
    sinFreq: p.sinFreq || 0,
    sinPhase: Math.random() * Math.PI * 2,
    accel: p.accel || 0,
    hp,
    maxHp: hp,
    flashTimer: 0,
    points: pts[type]
  };
  if (type === 'sumo') {
    enemy.sumoState = 'normal';
    enemy.sumoTimer = 80 + Math.floor(Math.random() * 80);
    enemy.baseVy = 1.2;
  }
  if (type === 'car') {
    enemy.carTimer = 20 + Math.floor(Math.random() * 40);
  }
  if (type === 'trump') {
    enemy.trumpShootTimer = 60 + Math.floor(Math.random() * 40);
  }
  enemies.push(enemy);
}

function spawnSpecialItem() {
  const types = ['invincible', 'baseball'];
  const type = types[Math.floor(Math.random() * types.length)];
  const r = 18;
  const x = r + Math.random() * (view.w - r * 2);
  specialItems.push({
    type, x, y: -r, r, vy: 1.8
  });
}

// ===== Kill enemy =====
function killEnemy(e) {
  e.hp = 0;
  spawnParticles(e.x, e.y, e.type === 'ichigo' ? '#FF6B6B' : e.type === 'donut' ? '#5A6E35' : e.type === 'onigiri' ? '#8B5E3C' : e.type === 'luchador' ? '#CC0000' : e.type === 'sumo' ? '#1A1A7A' : e.type === 'car' ? '#CC1111' : e.type === 'trump' ? '#F4884A' : '#fffdf5', 10);
  if (true) {
    addScore(e.points * (player.invincible ? 1.2 : 1));
  }
}

function addScore(pts) {
  gameState.score += Math.floor(pts);
}

// ===== Collision =====
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function circleRectOverlap(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX;
  const dy = cy - nearY;
  return dx*dx + dy*dy < cr*cr;
}

// ===== Update =====
function updateGame() {
  scrollOffset += 2;

  // smooth player movement
  player.x += (player.targetX - player.x) * 0.18;
  player.x = Math.max(0, Math.min(view.w - player.w, player.x));

  // clamp targetX
  player.targetX = Math.max(0, Math.min(view.w - player.w, player.targetX));

  // auto shoot
  if (frameCount % AUTO_SHOOT_INTERVAL === 0) {
    bullets.push({
      x: player.x + player.w / 2,
      y: player.y,
      vy: -BULLET_SPEED,
      r: 6
    });
  }

  // update bullets
  bullets = bullets.filter(b => {
    b.y += b.vy;
    return b.y > -b.r;
  });

  // spawn enemies
  nextEnemySpawn--;
  if (nextEnemySpawn <= 0) {
    spawnEnemy();
    nextEnemySpawn = ENEMY_SPAWN_INTERVAL_MIN + Math.floor(Math.random() * (ENEMY_SPAWN_INTERVAL_MAX - ENEMY_SPAWN_INTERVAL_MIN));
  }

  // spawn special items
  nextItemSpawn--;
  if (nextItemSpawn <= 0) {
    spawnSpecialItem();
    nextItemSpawn = 400 + Math.floor(Math.random() * 400);
  }

  // update enemies
  enemies.forEach(e => {
    e.sinPhase += e.sinFreq;
    e.vy += e.accel;
    e.x = e.baseX + Math.sin(e.sinPhase) * e.sinAmp;
    e.y += e.vy;

    if (e.type === 'car') {
      e.carTimer--;
      if (e.carTimer <= 0) {
        // ランダムに速度と方向を切り替え（蛇行運転）
        e.vx = (Math.random() - 0.5) * 14;
        e.vy = 0.6 + Math.random() * 7;
        e.carTimer = 18 + Math.floor(Math.random() * 50);
      }
      e.baseX += e.vx;
      // 壁バウンド
      if (e.baseX < e.size * 0.4) { e.baseX = e.size * 0.4; e.vx = Math.abs(e.vx) * 0.75; }
      if (e.baseX > view.w - e.size * 0.4) { e.baseX = view.w - e.size * 0.4; e.vx = -Math.abs(e.vx) * 0.75; }
    }
    if (e.type === 'sumo') {
      e.sumoTimer--;
      if (e.sumoState === 'normal' && e.sumoTimer <= 0) {
        // warning: slow way down before dive
        e.sumoState = 'warning';
        e.vy = 0.2;
        e.sumoTimer = 18;
      } else if (e.sumoState === 'warning' && e.sumoTimer <= 0) {
        // sudden dive!
        e.sumoState = 'diving';
        e.vy = 12 + Math.random() * 3;
        e.sumoTimer = 28 + Math.floor(Math.random() * 15);
      } else if (e.sumoState === 'diving' && e.sumoTimer <= 0) {
        // back to normal descent
        e.sumoState = 'normal';
        e.vy = 1.2;
        e.sumoTimer = 90 + Math.floor(Math.random() * 80);
      }
    }
    if (e.type === 'trump' && e.y > -e.size) {
      e.trumpShootTimer--;
      if (e.trumpShootTimer <= 0) {
        // プレイヤーに向けて札束ビーム発射
        const dx = (player.x + player.w/2) - e.x;
        const dy = (player.y + player.h/2) - e.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const speed = 4.5;
        trumpBullets.push({
          x: e.x, y: e.y + e.size * 0.1,
          vx: (dx/dist) * speed,
          vy: (dy/dist) * speed,
          r: 12,
          angle: Math.atan2(dy, dx)
        });
        e.trumpShootTimer = 80 + Math.floor(Math.random() * 40);
      }
    }
    if (e.flashTimer > 0) e.flashTimer--;
  });

  // update special items
  specialItems.forEach(item => { item.y += item.vy; });

  // bullet vs enemy
  bullets = bullets.filter(b => {
    let hit = false;
    enemies.forEach(e => {
      if (e.hp <= 0 || e.type === 'ichigo') return;
      if (circleRectOverlap(b.x, b.y, b.r, e.x - e.size*0.5, e.y - e.size*0.5, e.size, e.size)) {
        hit = true;
        e.hp--;
        e.flashTimer = 12;
        if (e.hp <= 0) killEnemy(e);
      }
    });
    return !hit;
  });

  // remove dead/off-screen enemies
  enemies = enemies.filter(e => {
    if (e.hp <= 0) return false;
    if (e.y > view.h + e.size) return false; // off screen
    return true;
  });

  // いちご：触れたらパルフェストーム＆ハート回復（無条件）
  enemies = enemies.filter(e => {
    if (e.hp <= 0 || e.type !== 'ichigo') return true;
    if (circleRectOverlap(e.x, e.y, e.size * 0.5, player.x, player.y, player.w, player.h)) {
      e.hp = 0;
      spawnParticles(e.x, e.y, '#FF6B6B', 10);
      if (!parfaitStorm) {
        triggerParfaitStorm(() => {
          if (gameState.hearts < MAX_HEARTS) {
            gameState.hearts++;
          }
        });
      }
      return false;
    }
    return true;
  });

  // enemy vs player（いちご以外）
  if (player.hitTimer <= 0) {
    enemies.forEach(e => {
      if (e.hp <= 0 || e.type === 'ichigo') return;
      if (circleRectOverlap(e.x, e.y, e.size * 0.5, player.x, player.y, player.w, player.h)) {
        if (player.invincible) {
          killEnemy(e);
          e.hp = 0;
        } else {
          takeDamage();
        }
      }
    });
  }

  // special item vs player
  specialItems = specialItems.filter(item => {
    if (item.y > view.h + item.r) return false;
    if (circleRectOverlap(item.x, item.y, item.r, player.x, player.y, player.w, player.h)) {
      collectItem(item.type);
      return false;
    }
    return true;
  });

  // update time display
  if (frameCount % 60 === 0) {
    const secs = Math.floor(frameCount / 60);
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    timeEl.innerText = `${m}:${String(s).padStart(2, '0')}`;
  }

  // invincible timer
  if (player.invincible) {
    player.invincibleTimer--;
    if (player.invincibleTimer <= 0) {
      player.invincible = false;
      player.invincibleTimer = 0;
    }
  }

  // trump bullets update & collision
  trumpBullets = trumpBullets.filter(tb => {
    tb.x += tb.vx;
    tb.y += tb.vy;
    if (tb.x < -tb.r || tb.x > view.w + tb.r || tb.y > view.h + tb.r) return false;
    if (circleRectOverlap(tb.x, tb.y, tb.r * 0.8, player.x, player.y, player.w, player.h)) {
      takeDamage();
      return false;
    }
    return true;
  });

  if (player.hitTimer > 0) player.hitTimer--;


}

function takeDamage() {
  if (player.hitTimer > 0) return;
  gameState.hearts--;
  player.hitTimer = HIT_INVINCIBLE_FRAMES;
  if (gameState.hearts <= 0) {
    gameState.hearts = 0;
    gameOver();
  }
}

function collectItem(type) {
  if (type === 'invincible') {
    player.invincible = true;
    player.invincibleTimer = INVINCIBLE_DURATION_FRAMES;
    spawnParticles(player.x + player.w/2, player.y, '#FFD700', 12);
  } else if (type === 'baseball') {
    triggerBaseballStorm();
    spawnParticles(player.x + player.w/2, player.y, '#ffffff', 12);
  }
}

// ===== Game over =====
function gameOver() {
  gameState.isRunning = false;
  dying = true;
  deathTimer = 0;
  deathAngle = 0;
  deathVy = -4;
  deathPlayerX = player.x + player.w / 2;
  deathPlayerY = player.y + player.h;
  shakeTimer = 50;
  deathFlashTimer = 50;
  enemies = [];
  bullets = [];
  specialItems = [];
  const finalScore = gameState.score;
  // show game over screen after animation finishes
  setTimeout(() => {
    dying = false;
    setOverlayState('gameover', finalScore);
    startScreenEl.style.display = 'flex';
    bgVideo.style.display = 'block';
    bgVideo.play();
    setTimeout(() => updateCarouselPosition(false), 50);
  }, (DEATH_DURATION / 60) * 1000 + 300);
}

// ===== Overlay =====
function setOverlayState(state, scoreValue = 0) {
  charSelectRow.style.display = (state === 'start' || state === 'gameover') ? 'flex' : 'none';
  if (state === 'start') {
    overlayMessageEl.style.display = 'none';
    overlaySubheadEl.innerText = 'キャラクターを選んでね';
    overlayCaptionEl.src = 'assets/logo.png';
    overlayCaptionEl.style.display = 'block';
    overlayScorePanel.classList.remove('visible');
    startBtn.innerText = 'START!';
  } else if (state === 'gameover') {
    overlayMessageEl.style.display = 'block';
    overlaySubheadEl.innerText = '';
    overlayCaptionEl.style.display = 'none';
    overlayScoreValue.innerText = scoreValue;
    overlayScorePanel.classList.add('visible');
    startBtn.innerText = 'もう一度チャレンジする';
  }
}

// ===== Init =====
function init() {
  resize();
  selectedChar = gameState.selectedChar = CHARS[charIndex].id;

  bullets = [];
  enemies = [];
  specialItems = [];
  particles = [];
  baseballStorm = null;
  parfaitStorm = null;
  trumpBullets = [];
  frameCount = 0;
  dying = false;
  deathTimer = 0;
  shakeTimer = 0;
  deathFlashTimer = 0;
  scrollOffset = 0;
  nextEnemySpawn = 60;
  nextItemSpawn = 300;

  gameState.score = 0;
  gameState.hearts = MAX_HEARTS;
  gameState.isRunning = true;
  timeEl.innerText = '0:00';

  player.w = Math.round(TILE_SIZE * 1.3);
  player.h = Math.round(TILE_SIZE * 1.1);
  player.x = view.w / 2 - player.w / 2;
  player.y = view.h * 0.75;
  player.targetX = player.x;
  player.invincible = false;
  player.invincibleTimer = 0;
  player.hitTimer = 0;

  startScreenEl.style.display = 'none';
  bgVideo.style.display = 'none';

  if (animationId) cancelAnimationFrame(animationId);
  gameLoop();
}

// ===== Game loop =====
function gameLoop() {
  if (!gameState.isRunning && !dying) return;

  ctx.clearRect(0, 0, view.w, view.h);

  // Screen shake offset
  const doShake = shakeTimer > 0;
  if (doShake) {
    const mag = Math.min(shakeTimer, 12);
    ctx.save();
    ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
    shakeTimer--;
  }

  drawBackground(ctx);

  if (gameState.isRunning) {
    updateGame();
    drawEnemies(ctx);
    drawSpecialItems(ctx);
    drawBullets(ctx);
    drawPlayer(ctx);
    drawParticles(ctx);
    drawBaseballStorm(ctx);
    drawTrumpBullets(ctx);
    drawParfaitStorm(ctx);
    drawHUD();
  }

  if (dying) {
    // update death physics
    deathVy += 0.4; // gravity
    deathPlayerY += deathVy;
    deathAngle += 0.18;
    deathTimer++;

    // draw spinning falling player
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - deathTimer / DEATH_DURATION);
    ctx.translate(deathPlayerX, deathPlayerY);
    ctx.rotate(deathAngle);
    const s = TILE_SIZE * 0.055;
    if (selectedChar === 'tetsuju') drawTetsuju(ctx, TILE_SIZE * 1.4, frameCount);
    else if (selectedChar === 'bal') drawBal(ctx, TILE_SIZE * 1.3, frameCount);
    else if (selectedChar === 'chamo') drawChamo(ctx, TILE_SIZE * 1.4, frameCount);
    else drawChihuahua(ctx, s, frameCount);
    ctx.restore();

    // red flash overlay
    if (deathFlashTimer > 0) {
      const alpha = (deathFlashTimer / 50) * 0.55;
      ctx.fillStyle = `rgba(220,0,0,${alpha})`;
      ctx.fillRect(0, 0, view.w, view.h);
      deathFlashTimer--;
    }

    drawHUD();
  }

  if (doShake) ctx.restore();

  frameCount++;
  animationId = requestAnimationFrame(gameLoop);
}

// ===== Input =====
const container = document.getElementById('game-container');

function handleTouchMove(e) {
  if (!gameState.isRunning) return;
  e.preventDefault();
  const touch = e.touches[0];
  player.targetX = touch.clientX - player.w / 2;
}

function handleTouchStart(e) {
  if (!gameState.isRunning) return;
  // Don't capture touches on overlay
  if (startScreenEl.style.display !== 'none') return;
  e.preventDefault();
  const touch = e.touches[0];
  player.targetX = touch.clientX - player.w / 2;
}

function handleMouseMove(e) {
  if (!gameState.isRunning) return;
  player.targetX = e.clientX - player.w / 2;
}

canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('mousemove', handleMouseMove);

// keyboard
window.addEventListener('keydown', e => {
  if (!gameState.isRunning) return;
  if (e.key === 'ArrowLeft') player.targetX -= 30;
  if (e.key === 'ArrowRight') player.targetX += 30;
});

// Start button
startBtn.addEventListener('click', (e) => { e.preventDefault(); init(); });
startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); init(); });

// Initial state
buildCarousel();
initCarouselSwipe();
setOverlayState('start');

</script>
